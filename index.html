<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sostenibilitat - Premium</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Anàlisi de Consums: ITB Leaks</h1>
    </header>

    <main>
        <section id="calculadora">
            <h2>1. Configuració de l'Anàlisi</h2>

            <div class="selector-container">
                <label for="selectorEscenari">Triar escenari de càlcul:</label>
                <select id="selectorEscenari" onchange="actualitzarDashboard()">
                    <option value="any">Any Complet (Estàndard)</option>
                    <option value="curs">Curs Escolar (Setembre - Juny)</option>
                    <option value="any1">Escenari Any 1 (-10% d'estalvi)</option>
                    <option value="any2">Escenari Any 2 (-20% d'estalvi)</option>
                    <option value="any3">Escenari Any 3 (-30% d'estalvi)</option>
                </select>
            </div>

            <div class="panell-inputs">
                <div class="input-group">
                    <label>Electricitat base (kWh/mes):</label>
                    <input type="number" id="baseElec" readonly>
                </div>
                <div class="input-group">
                    <label>Aigua base (L/mes):</label>
                    <input type="number" id="baseAigua" readonly>
                </div>
                <div class="input-group">
                    <label>Oficina base (€/mes):</label>
                    <input type="number" id="baseOfi" readonly>
                </div>
                <div class="input-group">
                    <label>Neteja base (€/mes):</label>
                    <input type="number" id="baseNet" readonly>
                </div>
            </div>

            <h2 id="titol-resultats">2. Projecció de Resultats</h2>
            <div id="resultats-grid" class="grid-resultats">
                </div>

            <div class="seccion-cronologia">
                <h2 id="titol-grafic">📈 Evolució Mensual de l'Escenari</h2>
                <div class="grafic-container">
                    <canvas id="graficEvolucio"></canvas>
                </div>
            </div>
        </section>

        <section id="reduccio">
            <h2>3. Full de Ruta (Estratègia Circular)</h2>
            <table class="taula-accions">
                <thead>
                    <tr>
                        <th>Fase</th>
                        <th>Objectiu</th>
                        <th>Accions Clau</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td><strong>Any 1</strong></td><td>-10%</td><td>LEDs i compra a granel.</td></tr>
                    <tr><td><strong>Any 2</strong></td><td>-20%</td><td>Digitalització total i Paper 0.</td></tr>
                    <tr><td><strong>Any 3</strong></td><td>-30%</td><td>Plaques solars i airejadors.</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
