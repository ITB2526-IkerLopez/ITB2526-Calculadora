<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sostenibilitat - Calculadora</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>ITB Leaks: Sostenibilitat</h1>
        <nav class="navegacio">
            <a href="index.html" class="btn-nav active">📊 Calculadora</a>
            <a href="impacte.html" class="btn-nav">🚀 Pla d'Impacte 30%</a>
        </nav>
    </header>

    <main>
        <section class="pagina-contingut active">
            <div class="selector-container">
                <label>Triar escenari de càlcul:</label>
                <select id="selectorEscenari" onchange="actualitzarDashboard()">
                    <option value="any">Any Complet 2026</option>
                    <option value="curs">Curs Escolar (Setembre - Juny) 2026</option>
                    <option value="any1">Escenari Any 2027 (-10% d'estalvi)</option>
                    <option value="any2">Escenari Any 2028 (-20% d'estalvi)</option>
                    <option value="any3">Escenari Any 2029 (-30% d'estalvi)</option>
                </select>
            </div>

            <div class="panell-inputs">
                <div class="input-group"><label>Llum (kWh/mes)</label><input type="number" id="baseElec" readonly></div>
                <div class="input-group"><label>Aigua (L/mes)</label><input type="number" id="baseAigua" readonly></div>
                <div class="input-group"><label>Oficina (€/mes)</label><input type="number" id="baseOfi" readonly></div>
                <div class="input-group"><label>Neteja (€/mes)</label><input type="number" id="baseNet" readonly></div>
            </div>

            <h2 id="titol-resultats">2. Projecció de Resultats</h2>
            <div id="resultats-grid" class="grid-resultats"></div>

            <div class="seccion-cronologia">
                <h2>📈 Evolució Mensual</h2>
                <div class="grafic-container"><canvas id="graficEvolucio"></canvas></div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
